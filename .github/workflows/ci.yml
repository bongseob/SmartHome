name: CI

# docs/test-strategy.md §9 "PR 게이트: lint + typecheck + unit + contract + integration 통과 필수"
# 중 lint + typecheck + (unit·contract) test까지 다룬다. integration은 `integration.yml`로 분리
# (Testcontainers 기동 시간이 있어 별도 워크플로, docs/implementation-tracker.md M14 참고).
# Playwright E2E는 아직 도입 전이라 두 워크플로 어디에도 없다(후속).
# lint는 2026-07-14 루트 eslint.config.mjs 신설로 게이트에 포함(최초 도입 — 실제 버그를 잡는
# 규칙 위주로 최소 구성, 점진적으로 강화 예정).

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-typecheck-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.9

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run lint

      # turbo 태스크 의존성(dependsOn: ["^build"])상 typecheck/test 전에 워크스페이스 build가
      # 필요하다 — 스텝을 나눠서 실패 지점을 명확히 구분한다(lint vs 빌드 실패 vs 타입 오류 vs 테스트 실패).
      - run: pnpm run build
      - run: pnpm run typecheck
      - run: pnpm run test
