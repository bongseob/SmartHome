name: CI

# docs/test-strategy.md §9 "PR 게이트: lint + typecheck + unit + contract + integration 통과 필수"의
# 첫 단계 — 이 워크플로는 typecheck + build + (unit·contract) test까지만 다룬다. integration/E2E는
# testcontainers·Playwright가 아직 도입되지 않아 후속 워크플로로 분리한다(docs/implementation-tracker.md
# M14 참고). lint는 ESLint 설정 자체가 아직 없어(test-strategy.md §11 미해결) 이번엔 뺐다 — 빈 스텝을
# 넣어 통과한 것처럼 보이게 하지 않는다.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-typecheck-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # turbo 태스크 의존성(dependsOn: ["^build"])상 typecheck/test 전에 워크스페이스 build가
      # 필요하다 — 세 스텝을 나눠서 실패 지점을 명확히 구분한다(빌드 실패 vs 타입 오류 vs 테스트 실패).
      - run: pnpm run build
      - run: pnpm run typecheck
      - run: pnpm run test
