# SmartHome 프로덕션용 Mosquitto 설정 (PROJECT_RULES §5.1 — 평문 포트 비활성화, TLS만 허용).
# mosquitto.conf(dev)와 달리 1883/9001 평문 리스너가 없다 — mqtts(8883)/wss(9002)만 연다.
#
# 인증서는 infra/tls/generate-certs.sh(자체 서명 사설 CA)로 생성해 이 파일과 같은 위치의
# tls/ 아래(ca.crt/mosquitto.crt/mosquitto.key)에 둔다. 인증/ACL은 dev와 동일하게
# password_file/acl_file(provision:mqtt-auth가 생성/갱신) 기준이다 — TLS는 "전송 구간
# 암호화"만 추가하고, 계정/ACL 체계 자체는 바꾸지 않는다.
listener 8883
protocol mqtt
cafile /mosquitto/config/tls/ca.crt
certfile /mosquitto/config/tls/mosquitto.crt
keyfile /mosquitto/config/tls/mosquitto.key
allow_anonymous false
password_file /mosquitto/config/passwd
acl_file /mosquitto/config/acl

# WebSocket over TLS (대시보드/브라우저에서 직접 구독할 일이 생기면 대비 — 현재는 미사용,
# apps/api의 WS 브리지(M7)가 대신 Redis pub/sub을 경유한다)
listener 9002
protocol websockets
cafile /mosquitto/config/tls/ca.crt
certfile /mosquitto/config/tls/mosquitto.crt
keyfile /mosquitto/config/tls/mosquitto.key

persistence true
persistence_location /mosquitto/data/
log_dest stdout
