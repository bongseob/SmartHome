# SmartHome 개발용 Mosquitto 설정 (dev ONLY)
# 프로덕션은 TLS(8883/wss) 추가 적용 필요(PROJECT_RULES §5). 인증/ACL은 개발 단계부터 켜둔다 —
# packages/db `pnpm run provision:mqtt-auth`(@smarthome/db)가 passwd/acl을 생성/갱신한다.
listener 1883
allow_anonymous false
password_file /mosquitto/config/passwd
acl_file /mosquitto/config/acl

# WebSocket (대시보드 구독용)
listener 9001
protocol websockets

persistence true
persistence_location /mosquitto/data/
log_dest stdout
