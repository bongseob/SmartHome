# 개발 인프라 (dev ONLY). 프로덕션 아님.
# 실행: docker compose -f infra/docker-compose.dev.yml up -d
# 중지: docker compose -f infra/docker-compose.dev.yml down
#
# PostgreSQL은 기존 도커 컨테이너(포트 5432, DB=smarthome)를 사용한다.
# 아래는 MQTT 브로커(Mosquitto)와 Redis만 정의한다.
#
# 주의: 기존에 `docker run`으로 띄운 mosquitto 컨테이너가 있으면 이름이 충돌한다.
#       먼저 `docker rm -f mosquitto` 후 compose로 기동할 것.
services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"   # MQTT
      - "9001:9001"   # MQTT over WebSocket (대시보드 구독)
    volumes:
      # passwd/acl은 packages/db provision:mqtt-auth 스크립트가 컨테이너 안에서 직접 갱신하므로
      # 쓰기 가능해야 한다(더 이상 :ro 아님) — mosquitto.conf 자체는 그대로 우리가 관리한다.
      - ./mosquitto:/mosquitto/config
      - mosquitto-data:/mosquitto/data     # retained 메시지·세션 영속
      - mosquitto-log:/mosquitto/log
    healthcheck:
      # 브로커에 실제 publish 해보고 성공하면 healthy
      test: ["CMD-SHELL", "mosquitto_pub -h localhost -t healthcheck -m ok -q 1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 5s

  redis:
    image: redis:7-alpine
    container_name: smarthome-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ── 카메라/PTZ(M17, 옵션 기능, architecture.md §5-cam) ──────────────────
  # RTSP→WebRTC/HLS 중계는 자체 구현하지 않고 검증된 오픈소스 릴레이(MediaMTX, MIT)를 그대로
  # 쓴다 — Mosquitto를 전용 프로세스로 쓰는 것과 같은 철학. apps/media-gateway는 이 앞단에서
  # 서명 URL 발급만 담당한다.
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx
    restart: unless-stopped
    ports:
      - "8554:8554"      # RTSP (카메라/mock-camera가 여기로 publish)
      - "8888:8888"      # HLS 재생
      - "8889:8889"      # WebRTC(WHEP) 재생 HTTP
      - "8189:8189/udp"  # WebRTC ICE
    volumes:
      # authHTTPAddress가 host의 media-gateway(:8190/auth)를 가리키도록 두 줄만 바꾼 공식
      # 기본 설정(M17 Phase 4, mediamtx.yml 파일 상단 주석 참고).
      - ./mediamtx/mediamtx.yml:/mediamtx.yml:ro
    extra_hosts:
      # Linux 도커 엔진은 host.docker.internal을 자동 해석 못 한다(Windows/Mac Desktop만 기본
      # 지원) — 어디서 돌려도 mediamtx.yml의 host.docker.internal이 host-gateway로 풀리게 한다.
      - "host.docker.internal:host-gateway"

  # 실카메라 없이 로컬에서 RTSP→WebRTC/HLS 파이프라인을 검증하기 위한 목 카메라
  # (device-simulator와 동일한 철학 — 테스트 패턴 영상을 rtsp://mediamtx:8554/cam-01로 루프 송출).
  # mediamtx가 아직 안 떴을 때는 실패 후 restart 정책으로 재시도한다.
  mock-camera:
    image: mwader/static-ffmpeg:6.0
    container_name: smarthome-mock-camera
    restart: unless-stopped
    depends_on:
      - mediamtx
    command:
      - -re
      - -f
      - lavfi
      - -i
      - "testsrc=size=1280x720:rate=15"
      - -f
      - lavfi
      - -i
      - "sine=frequency=440:sample_rate=44100"
      - -c:v
      - libx264
      - -preset
      - ultrafast
      - -tune
      - zerolatency
      - -pix_fmt
      - yuv420p
      - -c:a
      - aac
      - -f
      - rtsp
      - rtsp://mediamtx:8554/cam-01

volumes:
  mosquitto-data:
  mosquitto-log:
  redis-data:
