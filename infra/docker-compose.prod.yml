# 프로덕션 인프라 설정(TLS 적용, PROJECT_RULES §5.1). 실제 배포 대상(K8s vs VM 등, 부록
# A.2 미정)에 따라 이 파일을 그대로 쓸지, 이를 기준으로 변환할지 달라진다 — 현재는
# docker-compose.dev.yml과 동일한 형태로 "설정만" 준비한 것이며, 실제 프로덕션 인프라에서
# 검증되지 않았다(로컬 dev 환경은 계속 docker-compose.dev.yml의 평문 포트를 쓴다).
#
# 사전 준비:
#   1. infra/tls/generate-certs.sh <실제 배포 호스트명 또는 IP> 실행
#   2. cp infra/tls/out/ca.crt infra/tls/out/mosquitto.crt infra/tls/out/mosquitto.key infra/mosquitto/tls/
#      (infra/mosquitto/tls/ 는 .gitignore 대상 — 개인키를 커밋하지 않는다)
#   3. api.crt/api.key는 apps/api를 구동하는 프로세스의 TLS_CERT_FILE/TLS_KEY_FILE로 지정
#      (apps/api는 컨테이너화돼 있지 않다 — 이 파일은 Mosquitto/Redis만 다룬다)
#   4. .env의 MQTT_URL을 mqtts://<host>:8883로, MQTT_CA_FILE을 ca.crt 경로로 바꾼다
#
# 실행: docker compose -f infra/docker-compose.prod.yml up -d
services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "8883:8883"   # MQTT over TLS
      - "9002:9002"   # MQTT over WebSocket+TLS
    environment:
      # healthcheck 전용 — provision:mqtt-auth가 발급한 공용 서비스 계정(svc-backend)을 그대로 쓴다.
      MQTT_HEALTHCHECK_USER: ${MQTT_USERNAME:?svc-backend 계정 필요 — provision:mqtt-auth 먼저 실행}
      MQTT_HEALTHCHECK_PASSWORD: ${MQTT_PASSWORD:?svc-backend 비밀번호 필요}
    volumes:
      - ./mosquitto/mosquitto.prod.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/passwd:/mosquitto/config/passwd
      - ./mosquitto/acl:/mosquitto/config/acl:ro
      - ./mosquitto/tls:/mosquitto/config/tls:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    healthcheck:
      test:
        - "CMD-SHELL"
        - >-
          mosquitto_pub -h localhost -p 8883 --cafile /mosquitto/config/tls/ca.crt
          -u "$$MQTT_HEALTHCHECK_USER" -P "$$MQTT_HEALTHCHECK_PASSWORD"
          -t healthcheck -m ok -q 1 || exit 1
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 5s

  redis:
    image: redis:7-alpine
    container_name: smarthome-redis
    restart: unless-stopped
    # 프로덕션은 호스트에 포트를 노출하지 않는다 — 같은 docker 네트워크의 서비스만 접근
    # (Redis는 MQTT/HTTP가 아니라 PROJECT_RULES §5.1 TLS 의무 대상은 아니지만, 대신 접근을
    # 네트워크 경계로 좁힌다. requirepass 적용은 배포 인프라 확정 시 함께 검토).
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  mosquitto-data:
  mosquitto-log:
  redis-data:
