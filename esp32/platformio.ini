; ESP32 릴레이 보드(디지털아웃 10채널) 펌웨어 — PlatformIO 프로젝트.
; 빌드: pio run   /   업로드: pio run -t upload   /   시리얼 모니터: pio device monitor

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps =
    ; PubSubClient는 publish()에 QoS를 지정할 방법이 없어(구독만 QoS1 가능) state/cmd·ack를
    ; QoS1로 발행해야 하는 프로젝트 규칙을 지킬 수 없었다(코드 리뷰 P1 #6) — PUBACK을 실제로
    ; 추적하는 QoS1 publish를 지원하는 256dpi/arduino-mqtt(lwmqtt)로 교체.
    256dpi/MQTT@^2.5.3
    bblanchon/ArduinoJson@^6.21.5
