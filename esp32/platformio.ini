; ESP32 릴레이 보드(디지털아웃 10채널) 펌웨어 — PlatformIO 프로젝트.
; 빌드: pio run   /   업로드: pio run -t upload   /   시리얼 모니터: pio device monitor

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^6.21.5

build_flags =
    ; PubSubClient 기본 128바이트 버퍼는 cmd/ack JSON에 비해 너무 작다.
    -D MQTT_MAX_PACKET_SIZE=512
